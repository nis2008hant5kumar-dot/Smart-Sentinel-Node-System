<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-color: #050b14;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-muted: #8b9bb4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            cursor: none;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.08), transparent 25%);
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Ambient animated background orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, 50px) scale(1.1);
            }
        }

        .container {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--surface-border);
            position: relative;
            z-index: 10;
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 242, 254, 0.05);
        }

        .logo {
            font-size: 36px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 300;
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 5px;
            position: relative;
        }

        .tab {
            flex: 1;
            padding: 10px;
            color: var(--text-muted);
            transition: 0.3s;
            font-weight: 500;
            font-size: 14px;
            border-radius: 8px;
            z-index: 2;
        }

        .tab:hover {
            color: #fff;
        }

        .tab.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            border: 1px solid var(--surface-border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: 0.3s;
            font-size: 14px;
            pointer-events: none;
        }

        input:focus {
            border-color: rgba(0, 242, 254, 0.5);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        input:focus~i,
        input:not(:placeholder-shown)~i {
            color: var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            margin-top: 10px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .primary {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #fff;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        .primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 242, 254, 0.3);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .success:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(16, 185, 129, 0.3);
        }

        #status-msg {
            margin-top: 15px;
            font-size: 13px;
            color: #ef4444;
            min-height: 20px;
            transition: 0.3s;
            font-weight: 500;
        }

        /* Cursor */
        .cursor {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 1001;
            transition: transform 0.1s;
            transform: translate(-50%, -50%);
        }

        .cursor-follower {
            width: 36px;
            height: 36px;
            border: 1.5px solid rgba(0, 242, 254, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            transition: transform 0.15s ease-out, width 0.3s, height 0.3s;
            transform: translate(-50%, -50%);
        }

        body:active .cursor-follower {
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0, 242, 254, 0.1);
        }

        .form-section {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <h2 class="logo"><i class="fa-solid fa-bolt"></i> Sentinel Node System</h2>
        <p class="subtitle">Secure Node Access</p>

        <div class="tabs">
            <div id="tab-login" class="tab active" onclick="showForm('login')">Login</div>
            <div id="tab-register" class="tab" onclick="showForm('register')">Register</div>
        </div>

        <div id="login-form" class="form-section">
            <div class="input-group">
                <input type="text" id="login-username" placeholder="Username" autocomplete="username">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-group">
                <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
                <i class="fa-solid fa-lock"></i>
            </div>
            <button class="primary" onclick="handleAuth('login')">
                <span>Login &amp; Connect</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </div>

        <div id="register-form" class="form-section" style="display:none;">
            <div class="input-group">
                <input type="text" id="reg-username" placeholder="Choose a Username">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <div class="input-group">
                <input type="text" id="reg-device" placeholder="Device Serial (e.g., SN-001)">
                <i class="fa-solid fa-microchip"></i>
            </div>
            <div class="input-group">
                <input type="password" id="reg-password" placeholder="Create Password" autocomplete="new-password">
                <i class="fa-solid fa-key"></i>
            </div>
            <button class="success" onclick="handleAuth('register')">
                <span>Register Hardware</span>
                <i class="fa-solid fa-link"></i>
            </button>
        </div>

        <p id="status-msg"></p>
    </div>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmB6Jj0XbpTFm0u44X1iRvGU64U62VCOU",
            authDomain: "ai-smart-sentinel-node-system.firebaseapp.com",
            projectId: "ai-smart-sentinel-node-system",
            storageBucket: "ai-smart-sentinel-node-system.appspot.com",
            messagingSenderId: "152209661326",
            appId: "1:152209661326:web:09566bb5db4ad799d318df",
            databaseURL: "https://ai-smart-sentinel-node-system-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.showForm = (type) => {
            document.getElementById("login-form").style.display = type === 'login' ? 'block' : 'none';
            document.getElementById("register-form").style.display = type === 'register' ? 'block' : 'none';
            document.getElementById("tab-login").className = type === 'login' ? 'tab active' : 'tab';
            document.getElementById("tab-register").className = type === 'register' ? 'tab active' : 'tab';
        };

        // Convert username → fake email for Firebase Auth
        const toEmail = (username) => username.trim().toLowerCase() + "@sentinel.node";

        window.handleAuth = async (type) => {
            const msg = document.getElementById("status-msg");
            msg.style.color = "#ff4d4d";
            msg.innerText = "Processing...";

            if (type === 'login') {
                const username = document.getElementById('login-username').value.trim();
                const pass = document.getElementById('login-password').value;

                if (!username) { msg.innerText = "Please enter your username."; return; }

                try {
                    const res = await signInWithEmailAndPassword(auth, toEmail(username), pass);

                    // Fetch linked device ID
                    const userSnap = await get(ref(db, `users/${res.user.uid}/deviceId`));
                    const deviceId = userSnap.exists() ? userSnap.val() : "12345678901";

                    // Force-set active_session → kicks out any previous session on this device
                    await set(ref(db, `nodes/${deviceId}/active_session`), username);

                    sessionStorage.setItem("deviceId", deviceId);
                    sessionStorage.setItem("username", username);
                    window.location.href = "dashboard.html";

                } catch (e) {
                    if (e.code === "auth/invalid-credential" || e.code === "auth/wrong-password" || e.code === "auth/user-not-found") {
                        msg.innerText = "Invalid username or password.";
                    } else {
                        msg.innerText = e.message;
                    }
                }

            } else {
                const username = document.getElementById('reg-username').value.trim();
                const sn = document.getElementById('reg-device').value.trim();
                const pass = document.getElementById('reg-password').value;

                if (!username) { msg.innerText = "Please choose a username."; return; }
                if (!sn) { msg.innerText = "Please enter a valid Device Serial Key."; return; }
                if (pass.length < 6) { msg.innerText = "Password must be at least 6 characters."; return; }

                try {
                    const res = await createUserWithEmailAndPassword(auth, toEmail(username), pass);

                    // Save username & linked device
                    await set(ref(db, `users/${res.user.uid}/username`), username);
                    await set(ref(db, `users/${res.user.uid}/deviceId`), sn);

                    msg.style.color = "#6eff9e";
                    msg.innerText = "Account created! Please login.";
                    showForm('login');
                } catch (e) {
                    if (e.code === "auth/email-already-in-use") {
                        msg.innerText = "Username already taken. Choose another.";
                    } else {
                        msg.innerText = e.message;
                    }
                }
            }
        };

        // Cursor Animation
        const cursor = document.querySelector(".cursor");
        const follower = document.querySelector(".cursor-follower");
        let mX = 0, mY = 0, pX = 0, pY = 0;
        document.addEventListener("mousemove", (e) => {
            mX = e.clientX; mY = e.clientY;
            cursor.style.left = `${mX}px`; cursor.style.top = `${mY}px`;
        });
        function animate() {
            pX += (mX - pX) * 0.15; pY += (mY - pY) * 0.15;
            follower.style.left = `${pX}px`; follower.style.top = `${pY}px`;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>

</html>
