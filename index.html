<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; cursor: none; }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
            background-size: 600% 600%;
            animation: bgMove 10s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes bgMove { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .container {
            backdrop-filter: blur(25px);
            background: rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 25px;
            width: 380px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
        }

        .logo { 
            font-size: 32px; 
            margin-bottom: 10px; 
            background: linear-gradient(45deg, #00d4ff, #00ffcc); 
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .tabs { display: flex; margin: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; padding: 10px; color: #aaa; transition: 0.3s; cursor: pointer; }
        .tab.active { color: #00d4ff; border-bottom: 2px solid #00d4ff; font-weight: bold; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-top: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .primary { background: linear-gradient(45deg, #00d4ff, #00ffcc); color: #000; }
        .success { background: linear-gradient(45deg, #28a745, #6eff9e); color: #fff; }

        #status-msg { margin-top: 15px; font-size: 13px; color: #ff4d4d; }

        /* Cursor */
        .cursor { width: 8px; height: 8px; background: #00d4ff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 1001; }
        .cursor-follower { width: 30px; height: 30px; border: 2px solid #00d4ff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="logo">⚡ Sentinel</h2>

        <div class="tabs">
            <div id="tab-login" class="tab active" onclick="showForm('login')">Login</div>
            <div id="tab-register" class="tab" onclick="showForm('register')">Register</div>
        </div>

        <div id="login-form">
            <input type="text" id="login-username" placeholder="Username" autocomplete="username">
            <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <button class="primary" onclick="handleAuth('login')">Login &amp; Take Control</button>
        </div>

        <div id="register-form" style="display:none;">
            <input type="text" id="reg-username" placeholder="Choose a Username">
            <input type="text" id="reg-device" placeholder="Device Serial (e.g., SN-001)">
            <input type="password" id="reg-password" placeholder="Create Password" autocomplete="new-password">
            <button class="success" onclick="handleAuth('register')">Register &amp; Link Hardware</button>
        </div>

        <p id="status-msg"></p>
    </div>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmB6Jj0XbpTFm0u44X1iRvGU64U62VCOU",
            authDomain: "ai-smart-sentinel-node-system.firebaseapp.com",
            projectId: "ai-smart-sentinel-node-system",
            storageBucket: "ai-smart-sentinel-node-system.appspot.com",
            messagingSenderId: "152209661326",
            appId: "1:152209661326:web:09566bb5db4ad799d318df",
            databaseURL: "https://ai-smart-sentinel-node-system-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.showForm = (type) => {
            document.getElementById("login-form").style.display = type === 'login' ? 'block' : 'none';
            document.getElementById("register-form").style.display = type === 'register' ? 'block' : 'none';
            document.getElementById("tab-login").className = type === 'login' ? 'tab active' : 'tab';
            document.getElementById("tab-register").className = type === 'register' ? 'tab active' : 'tab';
        };

        // Convert username → fake email for Firebase Auth
        const toEmail = (username) => username.trim().toLowerCase() + "@sentinel.node";

        window.handleAuth = async (type) => {
            const msg = document.getElementById("status-msg");
            msg.style.color = "#ff4d4d";
            msg.innerText = "Processing...";

            if (type === 'login') {
                const username = document.getElementById('login-username').value.trim();
                const pass    = document.getElementById('login-password').value;

                if (!username) { msg.innerText = "Please enter your username."; return; }

                try {
                    const res = await signInWithEmailAndPassword(auth, toEmail(username), pass);

                    // Fetch linked device ID
                    const userSnap = await get(ref(db, `users/${res.user.uid}/deviceId`));
                    const deviceId = userSnap.exists() ? userSnap.val() : "12345678901";

                    // Force-set active_session → kicks out any previous session on this device
                    await set(ref(db, `nodes/${deviceId}/active_session`), username);

                    sessionStorage.setItem("deviceId", deviceId);
                    sessionStorage.setItem("username", username);
                    window.location.href = "dashboard.html";

                } catch (e) {
                    if (e.code === "auth/invalid-credential" || e.code === "auth/wrong-password" || e.code === "auth/user-not-found") {
                        msg.innerText = "Invalid username or password.";
                    } else {
                        msg.innerText = e.message;
                    }
                }

            } else {
                const username = document.getElementById('reg-username').value.trim();
                const sn       = document.getElementById('reg-device').value.trim();
                const pass     = document.getElementById('reg-password').value;

                if (!username) { msg.innerText = "Please choose a username."; return; }
                if (!sn)       { msg.innerText = "Please enter a valid Device Serial Key."; return; }
                if (pass.length < 6) { msg.innerText = "Password must be at least 6 characters."; return; }

                try {
                    const res = await createUserWithEmailAndPassword(auth, toEmail(username), pass);

                    // Save username & linked device
                    await set(ref(db, `users/${res.user.uid}/username`), username);
                    await set(ref(db, `users/${res.user.uid}/deviceId`), sn);

                    msg.style.color = "#6eff9e";
                    msg.innerText = "Account created! Please login.";
                    showForm('login');
                } catch (e) {
                    if (e.code === "auth/email-already-in-use") {
                        msg.innerText = "Username already taken. Choose another.";
                    } else {
                        msg.innerText = e.message;
                    }
                }
            }
        };

        // Cursor Animation
        const cursor = document.querySelector(".cursor");
        const follower = document.querySelector(".cursor-follower");
        let mX = 0, mY = 0, pX = 0, pY = 0;
        document.addEventListener("mousemove", (e) => { 
            mX = e.clientX; mY = e.clientY; 
            cursor.style.left = `${mX}px`; cursor.style.top = `${mY}px`; 
        });
        function animate() { 
            pX += (mX - pX) * 0.15; pY += (mY - pY) * 0.15; 
            follower.style.left = `${pX}px`; follower.style.top = `${pY}px`; 
            requestAnimationFrame(animate); 
        }
        animate();
    </script>
</body>
</html>
