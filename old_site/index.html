<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* [Styles remain exactly as in your original file to preserve your beautiful UI] */
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg-color: #050b14; --surface: rgba(255, 255, 255, 0.03); --surface-border: rgba(255, 255, 255, 0.08); --text-muted: #8b9bb4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; cursor: none; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background-color: var(--bg-color); color: white; overflow: hidden; position: relative; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); z-index: 1; opacity: 0.6; animation: float 10s infinite ease-in-out alternate; }
        .orb-1 { width: 300px; height: 300px; background: var(--secondary); top: -100px; left: -100px; }
        .orb-2 { width: 400px; height: 400px; background: var(--primary); bottom: -150px; right: -100px; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }
        .container { backdrop-filter: blur(20px); background: var(--surface); padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid var(--surface-border); position: relative; z-index: 10; transition: all 0.4s; }
        .logo { font-size: 32px; margin-bottom: 5px; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; }
        .tabs { display: flex; margin-bottom: 25px; background: rgba(0, 0, 0, 0.2); border-radius: 12px; padding: 5px; }
        .tab { flex: 1; padding: 10px; color: var(--text-muted); cursor: pointer; font-size: 14px; border-radius: 8px; }
        .tab.active { color: #fff; background: rgba(255, 255, 255, 0.05); }
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 15px 15px 15px 45px; border-radius: 12px; border: 1px solid var(--surface-border); background: rgba(0, 0, 0, 0.2); color: white; outline: none; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-top: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .primary { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: #fff; }
        .success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
        #status-msg { margin-top: 15px; font-size: 13px; min-height: 20px; }
        .cursor { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 1001; }
        .cursor-follower { width: 36px; height: 36px; border: 1.5px solid rgba(0, 242, 254, 0.5); border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000; transition: transform 0.15s ease-out; }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <h2 class="logo"><i class="fa-solid fa-bolt"></i> Sentinel Node</h2>
        <p class="subtitle">Secure Node Access</p>

        <div class="tabs">
            <div id="tab-login" class="tab active" onclick="showForm('login')">Login</div>
            <div id="tab-register" class="tab" onclick="showForm('register')">Register</div>
        </div>

        <div id="login-form" class="form-section">
            <div class="input-group">
                <input type="text" id="login-username" placeholder="Username">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-group">
                <input type="password" id="login-password" placeholder="Password">
                <i class="fa-solid fa-lock"></i>
            </div>
            <button class="primary" onclick="handleAuth('login')">
                <span>Login & Connect</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </div>

        <div id="register-form" class="form-section" style="display:none;">
            <div class="input-group">
                <input type="text" id="reg-username" placeholder="Choose Username">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <div class="input-group">
                <input type="text" id="reg-device" placeholder="Device ID (e.g. 12345678901)">
                <i class="fa-solid fa-microchip"></i>
            </div>
            <div class="input-group">
                <input type="password" id="reg-password" placeholder="Create Password">
                <i class="fa-solid fa-key"></i>
            </div>
            <button class="success" onclick="handleAuth('register')">
                <span>Register Hardware</span>
                <i class="fa-solid fa-link"></i>
            </button>
        </div>

        <p id="status-msg"></p>
    </div>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmB6Jj0XbpTFm0u44X1iRvGU64U62VCOU",
            authDomain: "ai-smart-sentinel-node-system.firebaseapp.com",
            projectId: "ai-smart-sentinel-node-system",
            storageBucket: "ai-smart-sentinel-node-system.appspot.com",
            messagingSenderId: "152209661326",
            appId: "1:152209661326:web:09566bb5db4ad799d318df",
            databaseURL: "https://ai-smart-sentinel-node-system-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.showForm = (type) => {
            document.getElementById("login-form").style.display = type === 'login' ? 'block' : 'none';
            document.getElementById("register-form").style.display = type === 'register' ? 'block' : 'none';
            document.getElementById("tab-login").className = type === 'login' ? 'tab active' : 'tab';
            document.getElementById("tab-register").className = type === 'register' ? 'tab active' : 'tab';
        };

        const toEmail = (un) => un.trim().toLowerCase() + "@sentinel.node";

        window.handleAuth = async (type) => {
            const msg = document.getElementById("status-msg");
            msg.style.color = "#ff4d4d";
            msg.innerText = "Processing...";

            if (type === 'login') {
                const un = document.getElementById('login-username').value.trim();
                const pw = document.getElementById('login-password').value;

                try {
                    const res = await signInWithEmailAndPassword(auth, toEmail(un), pw);
                    const userSnap = await get(ref(db, `users/${res.user.uid}/deviceId`));
                    
                    // We no longer write to active_session here to avoid permission issues.
                    // The dashboard will now automatically connect to the device ID.
                    sessionStorage.setItem("deviceId", userSnap.exists() ? userSnap.val() : "12345678901");
                    sessionStorage.setItem("username", un);
                    window.location.href = "dashboard.html";
                } catch (e) {
                    msg.innerText = "Invalid username or password.";
                }
            } else {
                const un = document.getElementById('reg-username').value.trim();
                const sn = document.getElementById('reg-device').value.trim();
                const pw = document.getElementById('reg-password').value;

                try {
                    const res = await createUserWithEmailAndPassword(auth, toEmail(un), pw);
                    await set(ref(db, `users/${res.user.uid}/username`), un);
                    await set(ref(db, `users/${res.user.uid}/deviceId`), sn);
                    msg.style.color = "#6eff9e";
                    msg.innerText = "Registered! Please login.";
                    showForm('login');
                } catch (e) {
                    msg.innerText = e.message;
                }
            }
        };

        // UI Animations
        const cursor = document.querySelector(".cursor"), follower = document.querySelector(".cursor-follower");
        let mX = 0, mY = 0, pX = 0, pY = 0;
        document.addEventListener("mousemove", (e) => { mX = e.clientX; mY = e.clientY; cursor.style.left = `${mX}px`; cursor.style.top = `${mY}px`; });
        function animate() { pX += (mX - pX) * 0.15; pY += (mY - pY) * 0.15; follower.style.left = `${pX}px`; follower.style.top = `${pY}px`; requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
